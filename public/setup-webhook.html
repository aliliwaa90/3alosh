
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد بوت تليجرام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-yellow-400">🔗 ربط الويب هوك (Webhook)</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">توكن البوت (Bot Token)</label>
                <input type="text" id="token" placeholder="مثال: 123456:ABC-DEF..." class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-yellow-400 outline-none dir-ltr text-left">
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-1">رابط المشروع (Vercel URL)</label>
                <input type="text" id="url" placeholder="https://your-app.vercel.app" class="w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-white focus:border-yellow-400 outline-none dir-ltr text-left">
                <p class="text-[10px] text-slate-500 mt-1">بدون /api/bot في النهاية (سنضيفها تلقائياً)</p>
            </div>

            <button onclick="setWebhook()" class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 rounded-lg transition-all mt-4">
                تنفيذ الربط
            </button>

            <div id="result" class="hidden mt-4 p-4 rounded-lg text-sm font-mono dir-ltr text-left"></div>
        </div>
    </div>

    <script>
        async function setWebhook() {
            const token = document.getElementById('token').value.trim();
            let url = document.getElementById('url').value.trim();
            const resultDiv = document.getElementById('result');

            if (!token || !url) {
                alert('يرجى ملء جميع الحقول');
                return;
            }

            // Ensure URL has https:// and no trailing slash
            if (!url.startsWith('https://')) url = 'https://' + url;
            if (url.endsWith('/')) url = url.slice(0, -1);
            
            // Append the API path
            const webhookUrl = `${url}/api/bot`;

            resultDiv.classList.remove('hidden', 'bg-green-900', 'bg-red-900', 'text-green-200', 'text-red-200');
            resultDiv.innerText = 'جاري الاتصال بتليجرام...';
            resultDiv.className = 'mt-4 p-4 rounded-lg text-sm font-mono dir-ltr text-left bg-slate-700 text-white';

            try {
                const response = await fetch(`https://api.telegram.org/bot${token}/setWebhook?url=${webhookUrl}`);
                const data = await response.json();

                if (data.ok) {
                    resultDiv.classList.add('bg-green-900', 'text-green-200');
                    resultDiv.innerHTML = `✅ <strong>Success!</strong><br>${data.description}<br><br>Webhook set to: ${webhookUrl}`;
                } else {
                    resultDiv.classList.add('bg-red-900', 'text-red-200');
                    resultDiv.innerHTML = `❌ <strong>Error:</strong><br>${data.description}`;
                }
            } catch (error) {
                resultDiv.classList.add('bg-red-900', 'text-red-200');
                resultDiv.innerText = 'Error connecting to Telegram API. Check your internet connection.';
            }
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>
</html>
