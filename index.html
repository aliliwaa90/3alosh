
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tliker - Standalone Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class', 
        theme: {
          extend: {
            fontFamily: { sans: ['Cairo', 'sans-serif'] },
            colors: {
              primary: '#facc15', 
              secondary: '#1e293b',
              dark: '#020617'
            }
          },
        },
      }
    </script>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; scrollbar-width: none; }
      ::-webkit-scrollbar { display: none; }
      body { background-color: #020617; color: #ffffff; margin: 0; overflow-x: hidden; height: 100vh; font-family: 'Cairo', sans-serif; }
      #root { height: 100%; width: 100%; }
      .coin-glow { box-shadow: 0 0 60px rgba(250, 204, 21, 0.3); }
      .tap-animation {
        position: fixed; pointer-events: none; z-index: 100; font-weight: 900; color: #facc15; font-size: 28px;
        text-shadow: 0 0 15px rgba(0,0,0,0.6); animation: float-up 0.8s ease-out forwards;
      }
      @keyframes float-up {
        0% { transform: translateY(0) scale(1) rotate(0); opacity: 1; }
        100% { transform: translateY(-180px) scale(1.6) rotate(10deg); opacity: 0; }
      }
      .press-effect { transition: transform 0.05s ease-in-out; cursor: pointer; }
      .press-effect:active { transform: scale(0.9); }
    </style>
  <script type="importmap">
{
  "imports": {
    "@vercel/node": "https://esm.sh/@vercel/node@^5.5.16",
    "firebase/": "https://esm.sh/firebase@^12.7.0/",
    "vite": "https://esm.sh/vite@^7.3.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
